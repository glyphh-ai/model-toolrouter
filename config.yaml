# DevOps Tool Router
# Routes natural language requests to release step functions
# using HDC similarity on intent vectors.

name: devops-tool-router
version: 0.1.0
description: |
  Routes natural language DevOps requests (e.g. "create a release branch",
  "run the tests", "tag the release") to the correct tool function via
  HDC cosine similarity on intent segments. Encodes verb, object, domain,
  and keyword signals into high-dimensional vectors and matches against
  a catalog of tool exemplars.

author: Glyphh AI
license: MIT

encoder:
  dimensions: 10000
  seed: 42

auto_load_concepts: true

tests:
  file: tests.py
  directory: tests/
  data: tests/test-queries.json

roles:
  verb:
    type: categorical
    values:
      - build
      - deploy
      - query
      - manage

  object:
    type: text

  domain:
    type: categorical
    values:
      - release
      - test
      - build
      - docker

  keywords:
    type: text
    optional: true

  tool_id:
    type: text
    key_part: true

  confidence:
    type: numeric
    bin_width: 0.05
    min_value: 0.0
    max_value: 1.0

similarity:
  threshold: 0.35
  top_k: 3
