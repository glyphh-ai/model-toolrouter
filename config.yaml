# SaaS Tool Router
# Routes natural language requests to SaaS tool functions
# using HDC similarity on intent vectors.

name: saas-tool-router
version: 2.0.0
description: |
  Routes natural language SaaS requests (e.g. "send a Slack message",
  "refund the charge", "create a Jira ticket") to the correct tool
  function via HDC cosine similarity on intent segments. Encodes action,
  target, domain, and keyword signals into high-dimensional vectors and
  matches against a catalog of 38 tool exemplars across 8 domains.

author: Glyphh AI
license: MIT

encoder:
  dimensions: 10000
  seed: 42

auto_load_concepts: true

roles:
  action:
    type: categorical
    values:
      - send
      - search
      - create
      - get
      - list
      - update
      - delete
      - reply
      - share
      - upload
      - track
      - identify
      - assign
      - comment
      - charge
      - refund
      - cancel
      - subscribe
      - set
      - draft
      - none

  target:
    type: text

  domain:
    type: categorical
    values:
      - messaging
      - email
      - crm
      - payments
      - calendar
      - files
      - tickets
      - analytics

  keywords:
    type: text
    optional: true

similarity:
  threshold: 0.52
  top_k: 3
